spring:
    application:
        name: Trend-Service
    artemis:
        user: ${SPRING_ARTEMIS_USER:admin}
        password: ${SPRING_ARTEMIS_PASSWORD:admin}
        broker-url: tcp://${SPRING_ARTEMIS_HOST:localhost}:${SPRING_ARTEMIS_PORT:61616}

server:
    port: 8084
logging:
    level:
        org.springframework.web: INFO
        org.hibernate: INFO
        ROOT: WARN
        gt: DEBUG

management:
    tracing:
        sampling:
            probability: 1.0
        export:
            zipkin:
                endpoint: http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans

