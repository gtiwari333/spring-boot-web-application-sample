# Runs the whole application using GraalVM native images (no JVM).
# Build native images first:  ./build-native-images.sh
#
# Image naming: native images use -native suffix to distinguish from JVM images
#   JVM:   gtapp-content-checker-service:latest
#   Native: gtapp-content-checker-service-native:latest
services:
    localhost:
        image: alpine:latest
        command: sleep infinity
        ports:
            - "8080:8080"
            - "3306:3306"
            - "1025:1025"
            - "8025:8025"
            - "9411:9411"
            - "8081:8081"
            - "8083:8083"
            - "8084:8084"
            - "8085:8085"
            - "8086:8086"
            - "8161:8161"
            - "61616:61616"

    activemq:
        image: 'apache/activemq-artemis:2.44.0'
        environment:
            - "ARTEMIS_USER=admin"
            - "ARTEMIS_PASSWORD=admin"
        network_mode: "service:localhost"
        healthcheck:
            test: [ "CMD-SHELL", "curl -sf http://localhost:61616 || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    mysql:
        image: 'mysql:9.7'
        environment:
            - "MYSQL_USER=seedappuser"
            - "MYSQL_ROOT_PASSWORD=password"
            - "MYSQL_DATABASE=seedapp"
        command: mysqld --lower_case_table_names=1 --character_set_server=utf8mb4 --explicit_defaults_for_timestamp
        network_mode: "service:localhost"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    emailhog:
        image: 'richarvey/mailhog'
        network_mode: "service:localhost"
        healthcheck:
            test: [ "CMD-SHELL", "curl -sf http://localhost:8025 || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    zipkin:
        image: 'openzipkin/zipkin'
        network_mode: "service:localhost"
        healthcheck:
            test: [ "CMD-SHELL", "curl -sf http://localhost:9411/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    keycloak:
        image: 'quay.io/keycloak/keycloak:26.6.1'
        command: start-dev --import-realm
        environment:
            - "KEYCLOAK_DB=dev-file"
            - "KC_BOOTSTRAP_ADMIN_USERNAME=admin"
            - "KC_BOOTSTRAP_ADMIN_PASSWORD=admin"
            - "KEYCLOAK_FEATURES=scripts"
            - "KEYCLOAK_HTTP_PORT=8080"
            - "KEYCLOAK_HTTPS_PORT=9445"
        volumes:
            - ../main-app/main-webapp/src/main/resources/keycloak/:/opt/keycloak/data/import
        network_mode: "service:localhost"
        healthcheck:
            test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1" ]
            interval: 15s
            timeout: 5s
            retries: 15
            start_period: 60s  # Keycloak + realm import is slow

    content-checker-service:
        image: gtapp-content-checker-service-native:latest
        network_mode: "service:localhost"
        depends_on:
            zipkin:
                condition: service_healthy
            activemq:
                condition: service_healthy

    email-service:
        image: gtapp-email-service-native:latest
        environment:
            - "SPRING_PROFILES_ACTIVE=prod"
        network_mode: "service:localhost"
        depends_on:
            emailhog:
                condition: service_healthy
            zipkin:
                condition: service_healthy

    trend-service:
        image: gtapp-trend-service-native:latest
        environment:
            - "SPRING_PROFILES_ACTIVE=prod"
        network_mode: "service:localhost"
        depends_on:
            zipkin:
                condition: service_healthy

    report-service:
        image: gtapp-report-service-native:latest
        environment:
            - "SPRING_PROFILES_ACTIVE=prod"
        network_mode: "service:localhost"
        depends_on:
            zipkin:
                condition: service_healthy
            mysql:
                condition: service_healthy
            keycloak:
                condition: service_healthy

    main-webapp:
        image: gtapp-main-webapp-native:latest
        environment:
            - "SPRING_PROFILES_ACTIVE=prod"
        network_mode: "service:localhost"
        depends_on:
            zipkin:
                condition: service_healthy
            email-service:
                condition: service_started  # no healthcheck defined, best effort
            mysql:
                condition: service_healthy
            activemq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        volumes:
            - /var/tmp/:/tmp/uploads/attachments/
