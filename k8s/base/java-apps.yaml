# content-checker-service
apiVersion: apps/v1
kind: Deployment
metadata:
    name: content-checker-service
    namespace: app-platform
spec:
    replicas: 1
    selector:
        matchLabels:
            app: content-checker-service
    template:
        metadata:
            labels:
                app: content-checker-service
        spec:
            containers:
                -   name: content-checker
                    image: gtapp-content-checker-service:latest
                    imagePullPolicy: Never   # ← add this to every Java app container
                    # No SPRING_PROFILES_ACTIVE in compose — don't add it
                    env:
                        -   name: MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT
                            value: "http://zipkin:9411/api/v2/spans"
                        -   name: SPRING_ARTEMIS_HOST
                            value: "activemq"
                        -   name: SPRING_ARTEMIS_PORT
                            value: "61616"
                        -   name: SPRING_ARTEMIS_MODE
                            value: "native"
                        -   name: SPRING_ARTEMIS_USER
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: ARTEMIS_USER
                        -   name: SPRING_ARTEMIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: app-secrets
                                    key: ARTEMIS_PASSWORD
                    ports:
                        -   containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
    name: content-checker-service
    namespace: app-platform
spec:
    selector:
        app: content-checker-service
    ports:
        -   port: 8080
            targetPort: 8080
