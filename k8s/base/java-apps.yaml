# main-webapp
apiVersion: apps/v1
kind: Deployment
metadata:
    name: main-webapp
    namespace: app-platform
spec:
    replicas: 1
    selector:
        matchLabels:
            app: main-webapp
    template:
        metadata:
            labels:
                app: main-webapp
        spec:
            hostAliases:
                # change this
                -   ip: "192.168.39.116"
                    hostnames:
                        - "keycloak.local"
            containers:
                -   name: main-webapp
                    image: gtapp-main-webapp:latest
                    imagePullPolicy: Never
                    env:
                        -   name: SPRING_PROFILES_ACTIVE
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: SPRING_PROFILES_ACTIVE
                        -   name: SPRING_ARTEMIS_MODE
                            value: "native"
                        -   name: SPRING_ARTEMIS_USER
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: ARTEMIS_USER
                        -   name: SPRING_ARTEMIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: app-secrets
                                    key: ARTEMIS_PASSWORD
                    ports:
                        -   containerPort: 8081
                    volumeMounts:
                        -   name: uploads
                            mountPath: /tmp/uploads/attachments
            volumes:
                -   name: uploads
                    emptyDir: { }      # or use a PVC if you need persistence across restarts
---
apiVersion: v1
kind: Service
metadata:
    name: main-webapp
    namespace: app-platform
spec:
    type: NodePort
    selector:
        app: main-webapp
    ports:
        -   port: 8081
            targetPort: 8081
            nodePort: 30081
