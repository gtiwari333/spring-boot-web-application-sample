# main-webapp
apiVersion: apps/v1
kind: Deployment
metadata:
    name: main-webapp
    namespace: app-platform
spec:
    replicas: 1
    selector:
        matchLabels:
            app: main-webapp
    template:
        metadata:
            labels:
                app: main-webapp
        spec:
            containers:
                -   name: main-webapp
                    image: gtapp-main-webapp:latest
                    imagePullPolicy: Never   # ← add this to every Java app container
                    env:
                        -   name: SPRING_PROFILES_ACTIVE
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: SPRING_PROFILES_ACTIVE
                        -   name: MANAGEMENT_TRACING_EXPORT_ZIPKIN_ENDPOINT
                            value: "http://zipkin:9411/api/v2/spans"
                        -   name: SPRING_DATASOURCE_URL
                            value: "jdbc:mysql://mysql:3306/seedapp"
                        -   name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI
                            value: "http://keycloak-external:30080/realms/seedapp"
                        -   name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_REDIRECT_URI
                            value: "http://localhost:30081/login/oauth2/code/oidc"
                        -   name: SPRING_ARTEMIS_HOST
                            value: "activemq"
                        -   name: SPRING_ARTEMIS_PORT
                            value: "61616"
                        -   name: SPRING_ARTEMIS_MODE
                            value: "native"
                        -   name: SPRING_ARTEMIS_USER
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: ARTEMIS_USER
                        -   name: SPRING_ARTEMIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: app-secrets
                                    key: ARTEMIS_PASSWORD
                        -   name: FEIGN_CLIENTS_EMAIL_SERVICE_URL
                            value: "http://email-service:8080"
                        -   name: FEIGN_CLIENTS_REPORT_SERVICE_URL
                            value: "http://report-service:8080"
                        - name: SERVER_USE_FORWARD_HEADERS
                          value: "true"
                        - name: SERVER_FORWARD_HEADERS_STRATEGY
                          value: "native"
                        -   name: APP_PROPERTIES_WEB_BASE_URL        # matches your app-properties.web.base-url config
                            value: "http://localhost:30081"
                    ports:
                        -   containerPort: 8081
                    volumeMounts:
                        -   name: uploads
                            mountPath: /tmp/uploads/attachments
            volumes:
                -   name: uploads
                    emptyDir: { }      # or use a PVC if you need persistence across restarts
---
apiVersion: v1
kind: Service
metadata:
    name: main-webapp
    namespace: app-platform
spec:
    type: NodePort
    selector:
        app: main-webapp
    ports:
        -   port: 8081
            targetPort: 8081
            nodePort: 30081
