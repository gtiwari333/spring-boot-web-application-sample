# main-webapp
apiVersion: apps/v1
kind: Deployment
metadata:
    name: main-webapp
    namespace: sample-app-ns
spec:
    replicas: 1
    selector:
        matchLabels:
            app: main-webapp
    template:
        metadata:
            labels:
                app: main-webapp
        spec:
            hostAliases:
                # change this to match the minikube's IP
                -   ip: "192.168.39.116"
                    hostnames:
                        - "keycloak.local"
            containers:
                -   name: main-webapp
                    image: gtapp-main-webapp:latest
                    imagePullPolicy: Never
                    env:
                        -   name: SPRING_PROFILES_ACTIVE
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: SPRING_PROFILES_ACTIVE
                        -   name: SPRING_ARTEMIS_MODE
                            value: "native"
                        -   name: SPRING_ARTEMIS_USER
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: ARTEMIS_USER
                        -   name: SPRING_ARTEMIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: app-secrets
                                    key: ARTEMIS_PASSWORD
                    ports:
                        -   containerPort: 8081
                    resources:
                        requests:
                            memory: "384Mi"
                            cpu: "200m"
                        limits:
                            memory: "768Mi"
                            cpu: "1000m"
                    volumeMounts:
                        -   name: uploads
                            mountPath: /tmp/uploads/attachments
                        -   name: spring-config-mount
                            mountPath: /workspace/config   # Spring Boot auto-scans this
                            readOnly: true
            volumes:
                -   name: uploads
                    emptyDir: { }      # or use a PVC if you need persistence across restarts
                -   name: spring-config-mount
                    configMap:
                        name: shared-spring-config-sbv4
---
apiVersion: v1
kind: Service
metadata:
    name: main-webapp
    namespace: sample-app-ns
spec:
    type: NodePort
    selector:
        app: main-webapp
    ports:
        -   port: 8081
            targetPort: 8081
            nodePort: 30081
