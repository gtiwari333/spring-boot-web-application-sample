# content-checker-service
apiVersion: apps/v1
kind: Deployment
metadata:
    name: content-checker-service
    namespace: sample-app-ns
spec:
    replicas: 1
    selector:
        matchLabels:
            app: content-checker-service
    template:
        metadata:
            labels:
                app: content-checker-service
        spec:
            volumes:
                -   name: spring-config-mount
                    configMap:
                        name: shared-spring-config-sbv4
            containers:
                -   name: content-checker
                    image: gtapp-content-checker-service:latest
                    imagePullPolicy: Never
                    env:
                        -   name: BPL_JVM_THREAD_COUNT
                            value: "50"
                        -   name: SPRING_PROFILES_ACTIVE
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: SPRING_PROFILES_ACTIVE
                        -   name: SPRING_ARTEMIS_USER
                            valueFrom:
                                configMapKeyRef:
                                    name: app-config
                                    key: ARTEMIS_USER
                        -   name: SPRING_ARTEMIS_PASSWORD
                            valueFrom:
                                secretKeyRef:
                                    name: app-secrets
                                    key: ARTEMIS_PASSWORD
                    ports:
                        -   containerPort: 8080
                    resources:
                        requests:
                            memory: "256Mi"
                            cpu: "100m"
                        limits:
                            memory: "512Mi"
                            cpu: "500m"
                    volumeMounts:
                        -   name: spring-config-mount
                            mountPath: /workspace/config   # Spring Boot auto-scans this
                            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
    name: content-checker-service
    namespace: sample-app-ns
spec:
    selector:
        app: content-checker-service
    ports:
        -   port: 8080
            targetPort: 8080
---
