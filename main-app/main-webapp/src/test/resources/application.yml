spring:
    application:
        name: Integration Test
    profiles:
        active: test
    liquibase:
        enabled: true
        change-log: classpath:/liquibase/master.xml
    jpa:
        show-sql: false
        open-in-view: false
        hibernate:
            ddl-auto: none  # we use liquibase
            naming:
                physical-strategy: gt.app.hibernate.PrefixedNamingStrategy
                implicit-strategy: org.springframework.boot.hibernate.SpringImplicitNamingStrategy
    mvc:
        static-path-pattern: /static/**
    jooq:
        sql-dialect: MYSQL
    main:
        banner-mode: off
    security:
        oauth2:
            client:
                provider:
                    oidc:
                        # KEYCLOAK_PORT system property no longer needed —
                        # use the DynamicPropertySource approach instead (see base test class below)
                        issuer-uri: ${keycloak.issuer-uri}
                registration:
                    oidc:
                        client-id: seed-app-gateway-client
                        client-secret: secret123
                        scope: openid, profile, email, offline_access # last one for refresh tokens
    artemis:
        # broker-url no longer needed here — @ServiceConnection sets it automatically
        user: admin
        password: admin
    jmx:
        enabled: false
springdoc:
    swagger-ui:
        enabled: false

debug: false

logging.level:
    ROOT: INFO
    gt: INFO
    sql: WARN
    org.apache: ERROR
#    net.ttddyy.dsproxy.listener.logging: DEBUG  # uncomment to see the queries with params

app-properties:
    file-storage:
        upload-folder: ${java.io.tmpdir}/uploads
    jms:
        content-checker-request-queue: jms-content-checker-requestqueue
        content-checker-call-back-response-queue: jms-content-checkercallback-responsequeue
    web:
        base-url: http://localhost:${server.port} #we use defined_port for integration testing where this base-url is used

feign-clients:
    email-service:
        url: http://localhost:00/  #TODO: find a better way to handle this
    report-service:
        url: http://localhost:00/

# enabled for test to assert query counts,
# note that both `jdbc.datasource-proxy` and `decorator.datasource` cannot be enabled at same time due to bean name conflict
decorator:
    datasource:
        enabled: true
        datasource-proxy:
            count-query: true
            slow-query:
                threshold: 1
            query:
                log-level: INFO
# https://github.com/jdbc-observations/datasource-micrometer
jdbc:
    datasource-proxy:
        enabled: false
