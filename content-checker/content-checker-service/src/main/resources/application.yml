spring:
    application:
        name: Trend-Service
    artemis:
        user: ${SPRING_ARTEMIS_USER:admin}
        password: ${SPRING_ARTEMIS_PASSWORD:admin}
        broker-url: tcp://${SPRING_ARTEMIS_HOST:localhost:61616}


server:
    port: 8083

jms:
    content-checkerrequest-queue: jms-content-checker-requestqueue
logging:
    level:
        web: INFO
        ROOT: WARN
        gt: DEBUG

management:
    tracing:
        sampling:
            probability: 1.0
    health:
        jms:
            enabled: true
        export:
            zipkin:
                endpoint: http://${ZIPKIN_HOST:localhost:9411}/api/v2/spans
